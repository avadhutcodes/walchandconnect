<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Connect - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f3460, #1877f2, #4aa3ff);
  position: relative;
  overflow-x: hidden;
  padding: 20px;
}

/* Blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.3;
  animation: float 12s ease-in-out infinite alternate;
}

.blob1 {
  width: 250px;
  height: 250px;
  background: #1877f2;
  top: -50px;
  left: -50px;
}

.blob2 {
  width: 300px;
  height: 300px;
  background: #4aa3ff;
  bottom: -80px;
  right: -80px;
  animation-delay: 2s;
}

.blob3 {
  width: 200px;
  height: 200px;
  background: #0d5bd3;
  top: 40%;
  left: 60%;
  animation-delay: 4s;
}

@keyframes float {
  0% { transform: translateY(0px); }
  100% { transform: translateY(-30px); }
}

/* Container */
.container {
  width: 100%;
  max-width: 900px;
  min-height: 500px;
  display: flex;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 25px 70px rgba(0,0,0,0.3);
  background: white;
  z-index: 1;
}

/* Left */
.left {
  flex: 1;
  background: linear-gradient(180deg, #1877f2, #0d5bd3);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
}

.left h1 {
  font-size: 32px;
}

.left p {
  margin-top: 10px;
  opacity: 0.9;
}

/* Right */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Form */
.form-box {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.form-box h2 {
  text-align: center;
  color: #1877f2;
}

/* Inputs */
input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #1877f2;
  box-shadow: 0 0 8px rgba(24,119,242,0.3);
}

/* Button */
button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #1877f2, #0d5bd3);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Link */
.signup-text {
  text-align: center;
  font-size: 14px;
  margin-top: 10px;
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .left {
    padding: 25px;
    text-align: center;
  }

  .left h1 {
    font-size: 26px;
  }

  .right {
    padding: 20px;
  }

  .form-box {
    max-width: 100%;
  }
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">

  <div class="left">
    <h1>Campus Connect</h1>
    <p>Welcome back! Login to continue.</p>
  </div>

  <div class="right">
    <form class="form-box" id="loginForm">
      <h2>Login</h2>

      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>

      <p class="signup-text">
        Don’t have an account? <a href="signup.html">Sign Up</a>
      </p>
    </form>
  </div>

</div>

<script>
const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if(res.ok) {
      alert("Login successful");
      window.location.href = "/dashboard";
    } else {
      alert(data.message || "Invalid credentials");
    }

  } catch (err) {
    console.error(err);
    
  }
});
</script>

</body>
</html>
